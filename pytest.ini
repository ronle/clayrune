[pytest]
# Main-app test suite (separate from control_plane/tests which has its own
# fixtures). Scaffolding added by IMPROVEMENT_PLAN_V2.md P1-5 — a safety net
# for the github_sync P0 fixes and the planned server.py split, NOT full
# coverage. See tests/README.md.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q
filterwarnings =
    ignore::DeprecationWarning
