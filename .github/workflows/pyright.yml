name: Pyright

# Type-check gate for the mc/ package + extracted backend modules
# (MODERNIZATION_PLAN.md Phase 4). Scope is pyrightconfig.json — server.py
# joins the include list only after Phase 1 shrinks it.
#
# NON-BLOCKING for now (`|| true`): flip to blocking once the baseline is
# clean. Same trigger scope as tests.yml: PRs + manual dispatch only.

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: pyright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pyright:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Pyright (non-blocking baseline)
        run: pyright --outputjson || true
