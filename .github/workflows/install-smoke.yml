name: Install smoke test

# Runs the live clayrune.io/install.sh against a clean Ubuntu + macOS runner
# to validate the end-to-end install flow.
#
# Why this exists: brand-new-Mac surprises like ~/.local/bin not being on
# PATH, nvm sourcing only landing in ~/.bashrc on a zsh-default machine,
# and Anthropic's curl-installer dropping claude somewhere fresh shells
# can't find — those were all caught only when Keegan tried to install on
# 2026-05-25 and pasted three rounds of broken output. This workflow turns
# that feedback loop into seconds, on every push to installer/.
#
# Auth-gated steps are NOT exercised here — the runner can't OAuth into
# Claude. We just verify install.sh gets THROUGH the install-and-PATH-fix
# phase and that a fresh login shell can still find `claude`.

on:
  push:
    paths:
      - 'installer/install.sh'
      - 'installer/_headers'
      - '.github/workflows/install-smoke.yml'
  pull_request:
    paths:
      - 'installer/install.sh'
  workflow_dispatch:

concurrency:
  group: install-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Run install.sh from clayrune.io (auth-gated parts will exit 1)
        env:
          CLAYRUNE_NO_CONFIRM: '1'
        run: |
          set +e
          curl -sSL https://clayrune.io/install.sh | sh
          ec=$?
          # install.sh exits 1 at the auth check (we can't OAuth in CI).
          # That's expected and acceptable — anything before that point
          # must have succeeded.
          if [ "$ec" -ne 0 ] && [ "$ec" -ne 1 ]; then
            echo "install.sh exited $ec — unexpected"
            exit "$ec"
          fi
          echo "install.sh reached the auth gate (exit $ec) — install phase OK"

      - name: Verify claude binary is reachable from a fresh login shell
        run: |
          # `bash -lc` simulates a brand-new terminal — must source the rc
          # files install.sh just modified. If our PATH-persist logic
          # works, `claude --version` succeeds here.
          bash -lc 'command -v claude && claude --version' || {
            echo "FAIL: fresh login shell can't find claude — PATH persistence broken"
            echo "Dumping rc files:"
            for f in ~/.bashrc ~/.bash_profile ~/.profile; do
              if [ -f "$f" ]; then echo "--- $f ---"; cat "$f"; fi
            done
            exit 1
          }

  macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Run install.sh from clayrune.io
        env:
          CLAYRUNE_NO_CONFIRM: '1'
        shell: zsh -l {0}
        run: |
          set +e
          curl -sSL https://clayrune.io/install.sh | sh
          ec=$?
          if [ "$ec" -ne 0 ] && [ "$ec" -ne 1 ]; then
            echo "install.sh exited $ec — unexpected"
            exit "$ec"
          fi
          echo "install.sh reached the auth gate (exit $ec) — install phase OK"

      - name: Verify claude reachable from a fresh zsh login shell
        shell: zsh -l {0}
        run: |
          # zsh -l reads ~/.zshrc — the file install.sh's PATH-persist
          # code is supposed to have modified. If our logic works here,
          # `claude --version` succeeds.
          command -v claude || {
            echo "FAIL: fresh zsh login shell can't find claude on PATH"
            echo "Dumping ~/.zshrc:"
            [ -f ~/.zshrc ] && cat ~/.zshrc || echo "(.zshrc does not exist)"
            echo "Searching common install dirs:"
            ls -la ~/.local/bin/claude ~/.claude/bin/claude ~/.npm-global/bin/claude /usr/local/bin/claude /opt/homebrew/bin/claude 2>&1 | head -10
            exit 1
          }
          claude --version

  macos-no-python:
    # Same as `macos` but with Python and Homebrew hidden from PATH so the
    # uv-fallback branch in Step 2/5 is actually exercised. macos-latest
    # ships with Python 3.13+ preinstalled, which short-circuits the
    # auto-install path entirely — without this scenario, a uv-path
    # regression would sail through CI and only break in production
    # (caught Keegan's MBP only because brew was also missing).
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Run install.sh with brew hidden + modern python hidden
        env:
          CLAYRUNE_NO_CONFIRM: '1'
        shell: zsh -l {0}
        run: |
          set +e
          # Strip only NON-SYSTEM dirs containing a python3 binary or brew.
          # We MUST keep /usr/bin and /bin on PATH — they hold curl, git,
          # sed, basename and the macOS-bundled python3 (which is 3.9, too
          # old for our 3.11+ check). Apple's old python3 stub being on PATH
          # is what makes _find_python return empty and trigger the
          # uv-fallback we want to test.
          stripped=$(echo "$PATH" | tr ':' '\n' | while read d; do
            [ -z "$d" ] && continue
            case "$d" in
              /usr/bin|/bin|/usr/sbin|/sbin|/System/*|/Library/Apple/*) echo "$d"; continue ;;
            esac
            [ -x "$d/python3" ] && continue
            [ -x "$d/python3.11" ] && continue
            [ -x "$d/python3.12" ] && continue
            [ -x "$d/python3.13" ] && continue
            [ -x "$d/brew" ] && continue
            echo "$d"
          done | paste -sd: -)
          export PATH="$stripped"
          hash -r 2>/dev/null || true
          echo "Stripped PATH: $PATH"
          echo "curl:" $(command -v curl || echo "(MISSING — bad)")
          echo "python3:" $(command -v python3 || echo "(missing)") "version:" $(python3 --version 2>&1 || echo "(none)")
          echo "brew:" $(command -v brew || echo "(missing — good)")
          # Run the live installer
          curl -sSL https://clayrune.io/install.sh | sh
          ec=$?
          # Auth gate exit-1 is expected (can't OAuth in CI). Anything else
          # means the install phase itself broke — including 0 if curl
          # silently did nothing (we proved curl exists above, so 0 here
          # would mean install.sh completed past auth, also fine).
          if [ "$ec" -ne 0 ] && [ "$ec" -ne 1 ]; then
            echo "install.sh exited $ec — unexpected"
            exit "$ec"
          fi
          echo "install.sh exit $ec — install phase OK"

      - name: Verify uv installed a Python and venv works
        shell: zsh -l {0}
        run: |
          # uv installs to ~/.local/share/uv/python/. Confirm a python lives
          # there and venv setup left a working interpreter behind.
          ls -la ~/.local/bin/uv 2>&1 || { echo "FAIL: uv binary missing"; exit 1; }
          ~/.local/bin/uv python list --only-installed 2>&1 | head -5
          test -x "$HOME/Clayrune/.venv/bin/python" || {
            echo "FAIL: venv python missing — install.sh's Step 2 didn't complete"
            ls -la "$HOME/Clayrune/.venv/bin/" 2>&1 || true
            exit 1
          }
          "$HOME/Clayrune/.venv/bin/python" --version
